# Builds YTDisc for macOS (universal), Windows (portable .exe), and
# Linux (AppImage), then attaches the artifacts to the GitHub Release
# that triggered the run.
#
# Trigger: publish a Release in the GitHub UI (or `gh release create`).
# Drafts and pre-releases also fire on `published` once they go live.

name: Release builds

on:
  release:
    types: [published]
  # Also allow manual runs for testing — won't upload artifacts to a
  # release, but useful for verifying the build still passes.
  workflow_dispatch:

permissions:
  contents: write   # needed to upload assets to the triggering release

env:
  # All the actions we use (checkout, setup-go, setup-node,
  # pnpm/action-setup, action-gh-release) still ship as Node 20
  # actions, which the runner now warns will stop working June 2026.
  # Opt into Node 24 now to silence the warning and avoid surprise
  # breakage when GitHub flips the default. Safe to remove once each
  # action publishes a Node 24-native version.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v4
        with:
          # pnpm v11 requires Node 22.13+. Bumping past current LTS
          # to match what the build script and pnpm both want.
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build universal .app
        run: wails build -platform darwin/universal -clean

      - name: Zip the .app for distribution
        # GitHub Releases only accepts files, not directories — and a
        # macOS .app is technically a directory (a bundle). So the .app
        # has to be archived into a single file to be uploaded.
        #
        # We use `ditto` rather than plain `zip` because it's Apple's
        # recommended tool for archiving .app bundles — it preserves
        # extended attributes and the bundle's internal structure
        # (relevant even for ad-hoc-signed apps; `zip` can drop
        # xattrs that confuse macOS on extract). Either way, users
        # will still need to right-click → Open the first time since
        # the app isn't Developer-ID-signed and notarized.
        run: |
          cd build/bin
          ditto -c -k --keepParent YTDisc.app YTDisc-darwin-universal.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/YTDisc-darwin-universal.zip

      - name: Upload as workflow artifact (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: YTDisc-darwin-universal
          path: build/bin/YTDisc-darwin-universal.zip

  windows:
    name: Windows (amd64 portable)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v4
        with:
          # pnpm v11 requires Node 22.13+. Bumping past current LTS
          # to match what the build script and pnpm both want.
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build portable .exe
        # Default Wails Windows build = single self-contained .exe with
        # no installer. Do NOT pass -nsis (or any installer flag) — the
        # whole point of the YTDisc release is a single file the user
        # drops onto a USB stick. Only runtime dependency is Microsoft
        # Edge WebView2, which ships with Windows 10/11 by default.
        run: wails build -platform windows/amd64 -clean

      - name: Rename for upload
        shell: pwsh
        run: |
          Rename-Item -Path "build\bin\YTDisc.exe" -NewName "YTDisc-windows-amd64.exe"

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/YTDisc-windows-amd64.exe

      - name: Upload as workflow artifact (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: YTDisc-windows-amd64
          path: build/bin/YTDisc-windows-amd64.exe

  linux:
    name: Linux (AppImage)
    # 22.04 ships WebKit2GTK 4.0, which is what Wails defaults to.
    # Newer Ubuntu has 4.1, requires the `webkit2_41` build tag — we
    # stick with 4.0 here for broader glibc compatibility on the
    # resulting AppImage.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        # Beyond the Wails toolchain (gtk + webkit2gtk + build-essential),
        # linuxdeploy-plugin-gtk needs desktop-file-utils + appstream to
        # validate/patch the .desktop file, librsvg2-common for SVG
        # icon rendering, and shared-mime-info for the icon themes it
        # bundles. libfuse2 is needed because linuxdeploy and
        # appimagetool both ship as AppImages and would otherwise fail
        # to mount on the runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            file \
            wget \
            desktop-file-utils \
            appstream \
            librsvg2-common \
            shared-mime-info \
            libfuse2

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v4
        with:
          # pnpm v11 requires Node 22.13+. Bumping past current LTS
          # to match what the build script and pnpm both want.
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Linux binary
        run: wails build -platform linux/amd64 -clean

      - name: Stage AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp build/bin/YTDisc AppDir/usr/bin/YTDisc
          cp build/appicon.png AppDir/YTDisc.png
          cat > AppDir/YTDisc.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=YTDisc
          Comment=Portable YouTube library player
          Exec=YTDisc
          Icon=YTDisc
          Categories=AudioVideo;Video;Player;
          Terminal=false
          EOF

      - name: Build AppImage
        # linuxdeploy creates AppRun, bundles GTK + WebKit2GTK shared
        # libs found via ldd, and runs appimagetool to produce the
        # final single-file AppImage.
        env:
          # Tells the linuxdeploy + appimagetool AppImages to extract
          # themselves and run from the extracted dir instead of
          # mounting via FUSE. GitHub-hosted runners' FUSE support is
          # flaky / disabled in newer images; this avoids the gamble.
          APPIMAGE_EXTRACT_AND_RUN: 1
        # `set -x` echoes commands so a failure is attributable to the
        # specific line, not just an exit code with no context. The
        # previous wget-based version exited 8 (HTTP error) with zero
        # output because `-q` silences error messages too — curl with
        # --fail --show-error does the opposite, and --retry handles
        # transient GitHub CDN blips so we don't fail on a hiccup.
        run: |
          set -x
          curl --fail --show-error --location --retry 5 --retry-delay 5 \
            --output linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          # NOTE: linuxdeploy-plugin-gtk no longer publishes GitHub
          # Releases (the repo went unmaintained Oct 2023; the
          # /releases/download/continuous/ URL now 404s — that's what
          # was tanking the build). Fetch the script directly from the
          # repo's master branch instead. Pin to a commit if you ever
          # need reproducibility.
          curl --fail --show-error --location --retry 5 --retry-delay 5 \
            --output linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk.sh
          ./linuxdeploy \
            --appdir AppDir \
            --plugin gtk \
            --output appimage
          # linuxdeploy names the file <Name>-<arch>.AppImage by default
          mv YTDisc-*.AppImage YTDisc-x86_64.AppImage

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: YTDisc-x86_64.AppImage

      - name: Upload as workflow artifact (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: YTDisc-x86_64-AppImage
          path: YTDisc-x86_64.AppImage
